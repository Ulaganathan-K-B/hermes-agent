  voice:
    enabled_voice_only:    "குரல் பயன்முறை (Voice mode) இயக்கப்பட்டது.\nநீங்கள் குரல் செய்திகளை அனுப்பும்போது நான் குரல் மூலம் பதிலளிப்பேன்.\nஅனைத்து செய்திகளுக்கும் குரல் பதில்களைப் பெற `/voice tts` ஐப் பயன்படுத்தவும்."
