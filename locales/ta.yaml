  resume:
    db_unavailable:        "அமர்வு தரவுத்தளம் கிடைக்கவில்லை."
    parse_error:           "⚠️ `/resume` அளபுருக்களைப் பாகுபடுத்த முடியவில்லை: {error}.\nஇடைவெளிகளைக் கொண்ட தலைப்புகளைச் சுற்றி மேற்கோள்களைப் பயன்படுத்தவும், உதாரணத்திற்கு: `/resume \"Project A Plan\"`."
    matrix_no_named_sessions: "இந்த மேட்ரிக்ஸ் (Matrix) அறைக்கு பெயரிடப்பட்ட அமர்வுகள் எதுவும் இல்லை.\nதற்போதைய அறை அமர்வுக்கு பெயரிட `/title My Session` ஐப் பயன்படுத்தவும், அனைத்து மேட்ரிக்ஸ் அமர்வுகளையும் பட்டியலிட `/resume --all` ஐப் பயன்படுத்தவும், அல்லது அறை எல்லைகளைத் தாண்டிச் செல்ல `/resume --cross-room <session name>` ஐப் பயன்படுத்தவும்."
    matrix_blocked_no_origin: "⚠️ மேட்ரிக்ஸ் `/resume` தடுக்கப்பட்டது: இந்த பெயரிடப்பட்ட அமர்வுக்கு பதிவு செய்யப்பட்ட அறை ஆதாரம் இல்லை, எனவே ஹெர்ம்ஸ் இயல்பாக தற்போதைய அறைக்குள் அதை மீண்டும் தொடங்காது. நீங்கள் வேண்டுமென்றே அறை எல்லைகளைத் தாண்ட விரும்பினால் `/resume --cross-room {name}` ஐப் பயன்படுத்தவும்."
    matrix_blocked_other_room: "⚠️ மேட்ரிக்ஸ் `/resume` தடுக்கப்பட்டது: அந்த அமர்வு வேறு மேட்ரிக்ஸ் அறைக்குச் ({room}) சொந்தமானது. நீங்கள் வேண்டுமென்றே அதை இங்கே மீண்டும் தொடங்க விரும்பினால் `/resume --cross-room {name}` ஐப் பயன்படுத்தவும்."
    matrix_cross_room_success: "⚠️ அறை கடந்த மறுதொடக்கம்: மேட்ரிக்ஸ் அறை **{room}** க்குள் **{title}** மீண்டும் தொடங்கப்பட்டது.\nஇந்த அறையில் எதிர்கால செய்திகள் `/reset` அல்லது மற்றொரு `/resume` வரை அந்த உரையாடலைப் பயன்படுத்தும்.{msg_part}"
    no_named_sessions:     "பெயரிடப்பட்ட அமர்வுகள் எதுவும் காணப்படவில்லை.\nஉங்கள் தற்போதைய அமர்வுக்கு பெயரிட `/title My Session` ஐப் பயன்படுத்தவும், பின்னர் அதற்குத் திரும்ப `/resume My Session` ஐப் பயன்படுத்தவும்."
