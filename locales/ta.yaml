# Hermes static-message catalog -- Tamil (ta)
#
# Only user-facing static messages from the CLI approval prompt and a handful
# of gateway slash-command replies live here. Agent-generated output, log
# lines, error tracebacks, tool outputs, and slash-command descriptions stay
# in English and are NOT translated -- see agent/i18n.py for scope rationale.
#
# Keys are dotted paths; nesting below is purely for readability. Values may
# contain {placeholder} tokens for str.format substitution. When adding a
# new key, add it to EVERY locale file (en/zh/ja/de/es/fr/tr/uk) in the same commit --
# tests/agent/test_i18n.py asserts catalog parity.

approval:
  # CLI approval prompt -- shown when a dangerous command needs user review.
  dangerous_header: "⚠️  ஆபத்தான கட்டளை: {description}"
  choose_long:     "      [o]ஒருமுறை  |  [s]அமர்வு  |  [a]எப்போதும்  |  [d]மறு"
  choose_short:    "      [o]ஒருமுறை  |  [s]அமர்வு  |  [d]மறு"
  prompt_long:     "      தேர்வு [o/s/a/D]: "
  prompt_short:    "      தேர்வு [o/s/D]: "
  timeout:         "      ⏱ காலக்கெடு - கட்டளை மறுக்கப்படுகிறது"
  allowed_once:    "      ✓ ஒரு முறை அனுமதிக்கப்படுகிறது"
  allowed_session: "      ✓ இந்த அமர்வுக்கு அனுமதிக்கப்பட்டது"
  allowed_always:  "      ✓ நிரந்தர அனுமதிப் பட்டியலில் சேர்க்கப்பட்டது"
  denied:          "      ✗ மறுக்கப்பட்டது"
  cancelled:       "      ✗ ரத்து செய்யப்பட்டது"
  blocklist_message: "இந்த கட்டளை நிபந்தனையற்ற தடுப்புப்பட்டியலில் உள்ளது எனவே அங்கீகரிக்க முடியாது."

gateway:
  # Messenger replies to slash commands and implicit state changes.
  approval_expired: "⚠️ ஒப்புதல் காலாவதியானது (முகவர் இனி காத்திருக்கவில்லை). மீண்டும் முயற்சிக்க முகவரிடம் கேட்கவும்."
  draining:         "⏳ மறுதொடக்கம் செய்வதற்கு முன் {count} செயலில் உள்ள முகவர்(கள்) நிறுத்தப்படுகிறார்கள்..."
  goal_cleared:     "✓ இலக்கு நீக்கப்பட்டது."
  no_active_goal:   "செயலில் உள்ள இலக்கு எதுவும் இல்லை."
  config_read_failed: "⚠️ config.yaml ஐப் படிக்க முடியவில்லை: {error}"
  config_save_failed: "⚠️ அமைப்பைச் சேமிக்க முடியவில்லை: {error}"

  # /model command output -- shown after a model switch or when listing models.
  # Provider names, model IDs, capability strings, and cost figures are NOT
  # translated -- they're identifiers/values, not prose. Only the labels
  # ("Provider:", "Context:", etc.) and the help/footer lines are localized.
  model:
    error_prefix:           "பிழை: {error}"
    switched:               "மாடல் `{model}`க்கு மாறியது"
    provider_label:         "வழங்குபவர்: {provider}"
    context_label:          "சூழல்: {tokens} டோக்கன்கள்"
    max_output_label:       "அதிகபட்ச வெளியீடு: {tokens} டோக்கன்கள்"
    cost_label:             "செலவு: {cost}"
    capabilities_label:     "திறன்கள்: {capabilities}"
    prompt_caching_enabled: "உடனடி கேச்சிங்: இயக்கப்பட்டது"
    warning_prefix:         "எச்சரிக்கை: {warning}"
    saved_global:           "config.yaml இல் சேமிக்கப்பட்டது (`--global`)"
    session_only_hint:      "_(அமர்வு மட்டும் — நிலைத்திருக்க `--global` என்பதைச் சேர்க்கவும்)_"
    current_label:          "நடப்பு: {provider} இல் `{model}`"
    current_tag:            " (தற்போதைய)"
    more_models_suffix:     " (+{count} மேலும்)"
    usage_switch_model:     "`/model <name>` — மாடல் மாற்றம்"
    usage_switch_provider:  "`/model <name> --provider <slug>` — சேவை வழங்குநரை மாற்றுதல்"
    usage_persist:          "`/model <name> --global` — நிலைத்திருக்கச் செய்ய"

  agents:
    header:                "🤖 **செயலில் உள்ள முகவர்கள் & பணிகள்**"
    active_agents:         "**செயலில் உள்ள முகவர்கள்:** {count}"
    this_chat:             " · இந்த அரட்டை"
    more:                  "... மேலும் {count}"
    running_processes:     "**இயங்கும் பின்னணிச் செயல்முறைகள்:** {count}"
    async_jobs:            "**கேட்வே ஒத்திசைவற்ற பணிகள்:** {count}"
    none:                  "செயலில் உள்ள முகவர்களோ அல்லது இயங்கும் பணிகளோ இல்லை."
    state_starting:        "தொடங்குகிறது"
    state_running:         "இயங்குகிறது"

  approve:
    no_pending:            "அங்கீகரிக்க எந்த கட்டளையும் நிலுவையில் இல்லை."
    once_singular:         "✅ கட்டளை அங்கீகரிக்கப்பட்டது. முகவர் மீண்டும் தொடங்குகிறார்..."
    once_plural:           "✅ கட்டளைகள் அங்கீகரிக்கப்பட்டன ({count} கட்டளைகள்). முகவர் மீண்டும் தொடங்குகிறார்..."
    session_singular:      "✅ கட்டளை அங்கீகரிக்கப்பட்டது (இந்த அமர்வுக்கான முறை அங்கீகரிக்கப்பட்டது). முகவர் மீண்டும் தொடங்குகிறார்..."
    session_plural:        "✅ கட்டளைகள் அங்கீகரிக்கப்பட்டன (இந்த அமர்வுக்கான முறை அங்கீகரிக்கப்பட்டது) ({count} கட்டளைகள்). முகவர் மீண்டும் தொடங்குகிறார்..."
    always_singular:       "✅ கட்டளை அங்கீகரிக்கப்பட்டது (முறை நிரந்தரமாக அங்கீகரிக்கப்பட்டது). முகவர் மீண்டும் தொடங்குகிறார்..."
    always_plural:         "✅ கட்டளைகள் அங்கீகரிக்கப்பட்டன (முறை நிரந்தரமாக அங்கீகரிக்கப்பட்டது) ({count} கட்டளைகள்). முகவர் மீண்டும் தொடங்குகிறார்..."

  background:
    usage:                 "பயன்பாடு: /background <prompt>\nஉதாரணம்: /background Summarize the top HN stories today\n\nபணிக்குறிப்பை ஒரு தனி அமர்வில் இயக்கும். நீங்கள் தொடர்ந்து உரையாடலாம் — பணி முடிந்ததும் அதற்கான முடிவு இங்கே தோன்றும்."
    started:               "🔄 பின்னணிப் பணி தொடங்கப்பட்டது: \"{preview}\"\nபணி ID: {task_id}\nநீங்கள் தொடர்ந்து உரையாடலாம் — முடிவுகள் முடிந்ததும் தோன்றும்."

  branch:
    db_unavailable:        "அமர்வு தரவுத்தளம் கிடைக்கவில்லை."
    no_conversation:       "கிளைக்க உரையாடல் இல்லை — முதலில் ஒரு செய்தியை அனுப்பவும்."
    create_failed:         "கிளையை உருவாக்க முடியவில்லை: {error}"
    switch_failed:         "கிளை உருவாக்கப்பட்டது ஆனால் அதற்கு மாற முடியவில்லை."
    branched_one:          "⑂ **{title}**-க்குக் கிளையாக்கப்பட்டது ({count} செய்தி நகலெடுக்கப்பட்டது)\nஅசல்: `{parent}`\nகிளை: `{new}`\nஅசலுக்குத் திரும்ப `/resume` கட்டளையைப் பயன்படுத்தவும்."
    branched_many:         "⑂ **{title}**-க்குக் கிளையாக்கப்பட்டது ({count} செய்திகள் நகலெடுக்கப்பட்டன)\nஅசல்: `{parent}`\nகிளை: `{new}`\nஅசலுக்குத் திரும்ப `/resume` கட்டளையைப் பயன்படுத்தவும்."

  commands:
    usage:                 "பயன்பாடு: `/commands [பக்கம்]`"
    skill_header:          "⚡ **திறன் கட்டளைகள்**:"
    default_desc:          "திறன் கட்டளை"
    none:                  "கட்டளைகள் எதுவும் கிடைக்கவில்லை."
    header:                "📚 **கட்டளைகள்** ({total} மொத்தம், பக்கம் {page}/{total_pages})"
    nav_prev:              "`/commands {page}` ← முந்தைய"
    nav_next:              "அடுத்தது → `/commands {page}`"
    out_of_range:          "_(கோரிய பக்கம் {requested} வரம்பிற்கு வெளியே உள்ளது, பக்கம் {page} காட்டப்படுகிறது.)_"

  compress:
    not_enough:            "சுருக்க போதுமான உரையாடல் இல்லை (குறைந்தது 4 செய்திகள் தேவை)."
    no_provider:           "எந்த வழங்குநரும் உள்ளமைக்கப்படவில்லை -- சுருக்க முடியாது."
    nothing_to_do:         "இன்னும் சுருக்க எதுவும் இல்லை (உரை முழுவதுமாகப் பாதுகாக்கப்பட்ட சூழலில் உள்ளது)."
    focus_line:            "கவணம்: \"{topic}\""
    summary_failed:        "⚠️ சுருக்கத்தை உருவாக்குவதில் தோல்வி ஏற்பட்டது ({error}). {count} முந்தைய செய்திகள் நீக்கப்பட்டு, அவற்றுக்குப் பதிலாக இடநிரப்பி சேர்க்கப்பட்டுள்ளது; முந்தைய சூழலை இனி மீட்டெடுக்க முடியாது. உங்கள் auxiliary.compression மாதிரி அமைப்புகளைச் சரிபார்க்கவும்."
    aborted:               "⚠️ சுருக்கம் நிறுத்தப்பட்டது ({error}). எந்தச் செய்திகளும் நீக்கப்படவில்லை — உரையாடல் மாற்றமின்றி உள்ளது. மீண்டும் முயற்சிக்க /compress கட்டளையையும், புதிய அமர்வைத் தொடங்க /reset கட்டளையையும் இயக்கவும், அல்லது auxiliary.compression மாதிரி அமைப்பைச் சரிபார்க்கவும்."
    aux_failed:            "ℹ️ அமைக்கப்பட்ட சுருக்க மாதிரி `{model}` தோல்வியடைந்தது ({error}). உங்கள் முதன்மை மாதிரியைப் பயன்படுத்தி மீட்டெடுக்கப்பட்டது — சூழல் அப்படியே உள்ளது — இருப்பினும் config.yaml இல் உள்ள `auxiliary.compression.model`-ஐ நீங்கள் சரிபார்க்க விரும்பலாம்."
    failed:                "சுருக்கம் தோல்வியடைந்தது: {error}"

  debug:
    upload_failed:         "✗ பிழைத்திருத்த அறிக்கையைப் பதிவேற்றுவதில் தோல்வி: {error}"
    header:                "**பிழைத்திருத்த அறிக்கை பதிவேற்றப்பட்டது:**"
    auto_delete:           "⏱ சேமிப்புகள் (Pastes) 6 மணிநேரத்தில் தானாக நீக்கப்படும்."
    full_logs_hint:        "முழுப் பதிவுப் பதிவேற்றங்களுக்கு, CLI இலிருந்து `hermes debug share` ஐப் பயன்படுத்தவும்."
    share_hint:            "ஆதரவுக்காக ஹெர்ம்ஸ் குழுவுடன் இந்த இணைப்புகளைப் பகிரவும்."

  deny:
    stale:                 "❌ கட்டளை மறுக்கப்பட்டது (அனுமதி காலாவதியாகிவிட்டது)."
    no_pending:            "மறுக்க எந்த கட்டளையும் நிலுவையில் இல்லை."
    denied_singular:       "❌ கட்டளை மறுக்கப்பட்டது."
    denied_plural:         "❌ கட்டளைகள் மறுக்கப்பட்டன ({count} கட்டளைகள்)."

  fast:
    not_supported:         "⚡ /fast என்பது முன்னுரிமை செயலாக்கத்தை ஆதரிக்கும் OpenAI மாடல்களுக்கு மட்டுமே கிடைக்கும்."
    status:                "⚡ முன்னுரிமைச் செயலாக்கம்\n\nதற்போதைய நிலை: `{mode}`\n\n_பயன்பாடு:_ `/fast <normal|fast|status>`"
    unknown_arg:           "⚠️ அறியப்படாத அளபுரு: `{arg}`\n\n**செல்லுபடியாகும் விருப்பங்கள்:** normal, fast, status"
    saved:                 "⚡ ✓ முன்னுரிமைச் செயலாக்கம்: **{label}** (அமைப்பில் சேமிக்கப்பட்டது)\n_(அடுத்த செய்தியில் நடைமுறைக்கு வரும்)_"
    session_only:          "⚡ ✓ முன்னுரிமைச் செயலாக்கம்: **{label}** (இந்த அமர்வுக்கு மட்டும்)"
    label_fast:            "FAST"
    label_normal:          "NORMAL"
    status_fast:           "fast"
    status_normal:         "normal"

  footer:
    status:                "📎 இயக்கநேர அடிக்குறிப்பு: **{state}**\nபுலங்கள்: `{fields}`\nதளமேடை: `{platform}`"
    usage:                 "பயன்பாடு: `/footer [on|off|status]`"
    saved:                 "📎 இயக்கநேர அடிக்குறிப்பு: **{state}**{example}\n_(உலகளவில் சேமிக்கப்பட்டது — அடுத்த செய்தியில் நடைமுறைக்கு வரும்)_"
    example_line:          "\nஉதாரணம்: `{preview}`"
    state_on:              "ஆன்"
    state_off:             "ஆஃப்"

  goal:
    unavailable:           "இந்த அமர்வில் இலக்குகள் கிடைக்கவில்லை."
    no_goal_set:           "இலக்கு எதுவும் நிர்ணயிக்கப்படவில்லை."
    paused:                "⏸ இலக்கு இடைநிறுத்தப்பட்டது: {goal}"
