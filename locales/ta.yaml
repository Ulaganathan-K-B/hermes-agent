  topic:
    not_telegram_dm:         "/topic கட்டளை Telegram தனிப்பட்ட உரையாடல்களில் மட்டுமே கிடைக்கும்."
    no_session_db:           "அமர்வு தரவுத்தளம் கிடைக்கவில்லை."
    unauthorized:            "இந்த bot இல் /topic பயன்படுத்த உங்களுக்கு அனுமதி இல்லை."
    restore_needs_topic:     "ஒரு அமர்வை மீட்டெடுக்க, முதலில் ஒரு Telegram topic ஐ உருவாக்கவோ அல்லது திறக்கவோ செய்யுங்கள். பின்னர் அந்த topic இல் `/topic <session-id>` என்பதை அனுப்புங்கள். புதிய topic உருவாக்க, All Messages ஐத் திறந்து ஏதேனும் ஒரு செய்தியை அனுப்புங்கள்."
    topics_disabled:         "இந்த bot க்காக Telegram topics இன்னும் இயக்கப்படவில்லை.\n\nஇயக்குவது எப்படி:\n1. @BotFather ஐத் திறக்கவும்.\n2. உங்கள் bot ஐத் தேர்ந்தெடுக்கவும்.\n3. Bot Settings → Threads Settings ஐத் திறக்கவும்.\n4. Threaded Mode ஐ இயக்கி, பயனர்கள் புதிய threads உருவாக்க அனுமதிக்கப்பட்டுள்ளார்களா என்பதை உறுதிப்படுத்தவும்.\n\nபின்னர் /topic ஐ மீண்டும் அனுப்புங்கள்."
    topics_user_disallowed:  "Telegram topics இயக்கப்பட்டுள்ளன, ஆனால் பயனர்கள் topics உருவாக்க அனுமதிக்கப்படவில்லை.\n\n@BotFather → உங்கள் bot → Bot Settings → Threads Settings சென்று 'Disallow users to create new threads' ஐ அணைக்கவும்.\n\nபின்னர் /topic ஐ மீண்டும் அனுப்புங்கள்."
    enable_failed:           "Telegram topic முறையை இயக்க முடியவில்லை: {error}"
    bound_status:            "இந்த topic இதனுடன் இணைக்கப்பட்டுள்ளது:\nஅமர்வு: {label}\nID: {session_id}\n\nஇந்த topic ஐ புதிய அமர்வால் மாற்ற /new ஐப் பயன்படுத்தவும்.\nஇணைநிலை பணிகளுக்கு, All Messages ஐத் திறந்து புதிய topic உருவாக்க ஒரு செய்தியை அனுப்புங்கள்."
    thread_ready:            "Telegram பல-அமர்வு topics இயக்கப்பட்டுள்ளன.\n\nஇந்த topic தனித்த Hermes அமர்வாக பயன்படுத்தப்படும். இந்த topic இன் தற்போதைய அமர்வை மாற்ற /new ஐப் பயன்படுத்தவும். இணைநிலை பணிகளுக்கு, All Messages ஐத் திறந்து புதிய topic உருவாக்க ஒரு செய்தியை அனுப்புங்கள்."
