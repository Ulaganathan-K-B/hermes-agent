    mode_new:              "⚙️ கருவி முன்னேற்றம்: **NEW** — கருவி மாறும்போது மட்டும் காட்டப்படும் (முன்னோட்ட நீளம்: `display.tool_preview_length`, இயல்புநிலை 40)."
