  verbose:
    not_enabled:           "`/verbose` கட்டளை செய்தி தளங்களில் இயக்கப்படவில்லை.\n\n`config.yaml` இல் இதை இயக்கவும்:\n```yaml\ndisplay:\n  tool_progress_command: true\n```"
