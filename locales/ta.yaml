  reload_mcp:
    cancelled:             "🟡 /reload-mcp ரத்துசெய்யப்பட்டது. MCP கருவிகள் மாறவில்லை."
    always_followup:       "ℹ️ எதிர்கால `/reload-mcp` அழைப்புகள் உறுதிப்படுத்தல் இல்லாமல் இயங்கும். config.yaml இல் `approvals.mcp_reload_confirm: true` மூலம் மீண்டும் இயக்கவும்."
    confirm_prompt:        "⚠️ **/reload-mcp ஐ உறுதிப்படுத்தவும்**\n\nMCP சேவையகங்களை மீண்டும் ஏற்றுவது இந்த அமர்வுக்கான கருவித் தொகுப்பை மீண்டும் உருவாக்குகிறது மற்றும் **வழங்குநரின் ப்ராம்ப்ட் கேச்சை (prompt cache) செல்லாததாக்குகிறது** — அடுத்த செய்தி முழு உள்ளீட்டு டோக்கன்களையும் மீண்டும் அனுப்பும். நீண்ட சூழல் அல்லது அதிக தர்க்க மாதிரிகளில் இது விலை உயர்ந்ததாக இருக்கும்.\n\nதேர்வு செய்யவும்:\n• **ஒருமுறை அனுமதி** — இப்போது மீண்டும் ஏற்றவும்\n• **என்றும் அனுமதி** — இப்போது மீண்டும் ஏற்றவும் மற்றும் இந்த வரியை நிரந்தரமாக மறைக்கவும்\n• **ரத்துசெய்** — MCP கருவிகளை மாற்றாமல் விடவும்\n\n_உரை மாற்று: `/approve`, `/always`, அல்லது `/cancel` என பதிலளிக்கவும்._"
    header:                "🔄 **MCP சேவையகங்கள் மீண்டும் ஏற்றப்பட்டன**\n"
