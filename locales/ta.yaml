    mode_verbose:          "⚙️ கருவி முன்னேற்றம்: **VERBOSE** — ஒவ்வொரு கருவி அழைப்பும் முழு அளவுருக்களுடன் காட்டப்படும்."
    saved_suffix:          "_(**{platform}** க்காக சேமிக்கப்பட்டது — அடுத்த செய்தியிலிருந்து அமலாகும்)_"
