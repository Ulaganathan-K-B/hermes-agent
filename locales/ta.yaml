    help:                  "{toggle}\n\n**/voice எவ்வாறு செயல்படுகிறது**\n• `/voice on` — நீங்கள் குரல் செய்தி அனுப்பும்போது குரல் பதில்\n• `/voice tts` — *ஒவ்வொரு* செய்திக்கும் குரல் பதில்\n• `/voice off` — மீண்டும் உரை வடிவிலான பதில்கள்\n• `/voice status` — தற்போதைய பயன்முறையைக் காட்டு\n• `/voice` (அளபுருக்கள் இல்லை) — ஆன் மற்றும் ஆஃப் இடையே விரைவான மாறுதல்{channels}"
    help_channels:         "\n\n**நேரடி குரல் சேனல்கள் (Discord)**\n• முதலில் ஒரு குரல் சேனலில் இணையவும், பின்னர் `/voice channel` — நான் இணைந்து, கேட்டு, எனது பதில்களைப் பேசுவேன்\n• `/voice leave` — குரல் சேனலிலிருந்து துண்டிக்கவும்"

